<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
<h2>WebSocket Test</h2>
<div id="output">Starting...</div>

<script>
const output = document.getElementById("output");

output.innerHTML += "<br>Script loaded";

const ws = new WebSocket("ws://localhost:8765");

ws.onopen = () => {
    output.innerHTML += "<br>✅ Connected";
};

ws.onmessage = (event) => {
    output.innerHTML += "<br>📩 " + event.data;
};

ws.onerror = (error) => {
    output.innerHTML += "<br>❌ Error";
    console.error(error);
};

ws.onclose = () => {
    output.innerHTML += "<br>🔌 Closed";
};
</script>

</body>
</html>
